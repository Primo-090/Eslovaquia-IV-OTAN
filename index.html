<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Eslovaquia Connect</title>

<style>
body{
background:linear-gradient(to bottom,#ffd6e7,#ffeef6);
font-family:Arial,sans-serif;
text-align:center;
padding-top:120px;
overflow:hidden;
}

h1{
color:#4a90ff;
font-size:55px;
animation: aparecer 2s;
}

p{
font-size:28px;
color:#555;
}

#alerta{
display:none;
font-size:35px;
font-weight:bold;
margin-top:20px;
color:#ff4d6d;
}

#video{
display:none;
margin-top:40px;
}

iframe{
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.2);
}

@keyframes aparecer{
from{
opacity:0;
transform:scale(.7)
}
to{
opacity:1;
transform:scale(1)
}
}
</style>
</head>

<body>

<h1>Welcome to my pregnancy 💕👶</h1>

<p id="estado">
Destino detectado: Eslovaquia 🇸🇰 <br><br>
Conectando grupo...
</p>

<div id="alerta">
🚨 NUEVA MISIÓN DETECTADA 🚨
</div>

<div id="video">

<iframe width="800"
height="450"
src="https://www.youtube.com/embed/4togCnhsSag?autoplay=1"
allow="autoplay"
allowfullscreen>
</iframe>

</div>

<script>

setTimeout(()=>{
document.getElementById("estado").innerHTML=
"Verificando acceso...";
},4000)

setTimeout(()=>{
document.getElementById("alerta").style.display="block";
},7000)

setTimeout(()=>{
document.getElementById("video").style.display="block";
},9000)

</script>

</body>

</html>
