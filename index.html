<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Eslovaquia IV Portal</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
text-align:center;
}

/* PORTAL */

#login{

background-image:url("240812_Escudo_Eslovaquia.jpg");
background-size:70%;
background-repeat:no-repeat;
background-position:center top;

height:100vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

color:white;
}

.fondo{
background:rgba(0,0,0,.7);

padding:40px;

border-radius:20px;
}

input{

padding:15px;

border:none;

border-radius:10px;

width:250px;

font-size:18px;
}

button{

margin-top:20px;

padding:15px 30px;

border:none;

border-radius:15px;

background:#0d6efd;

color:white;

font-size:20px;

cursor:pointer;
}

/* BABY */
#sorpresa{

display:none;

height:100vh;

background:linear-gradient(to bottom,#ffd6e7,#dcecff);

padding-top:80px;
}
#sorpresa h1{
color:#6bbcff;
font-size:45px;
text-shadow:0 0 10px rgba(255,255,255,.7);
}

#sorpresa h2{
color:#4a90ff;
}

video{

width:80%;

max-width:800px;

border-radius:20px;

box-shadow:0 0 20px rgba(0,0,0,.3);

margin-top:20px;
}

</style>

</head>

<body>

<div id="login">

<div class="fondo">

<h1>ESLOVAQUIA IV PORTAL</h1>

<p>Plataforma Multinacional de Acceso</p>

<input placeholder="Crear usuario">

<br>

<button onclick="entrar()">

Acceder

</button>

</div>

</div>

<div id="sorpresa">

<h1>

🚨 NUEVA MISIÓN: PAPÁS AHORA SOMOS 4👶❤️

</h1>

<h2>

Bienvenidas a la verdadera misión

</h2>

<video controls playsinline>

<source src="eslovaquiaIV.mp4" type="video/mp4">

</video>

</div>

<script>

function entrar(){

document.getElementById("login").style.display="none";

document.getElementById("sorpresa").style.display="block";

}

</script>

</body>
</html>
